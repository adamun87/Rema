name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Publish (Single-file, trimmed, win-x64)
        run: >
          dotnet publish src/Rema/Rema.csproj
          -c Release
          -r win-x64
          -o publish
          /p:Version=${{ inputs.version }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install sign CLI
        run: dotnet tool install --global sign --version 0.9.1-beta.25330.2

      - name: Sign Rema.exe
        shell: pwsh
        run: |
          sign code trusted-signing "${{ github.workspace }}\publish\Rema.exe" `
            -tse "https://wus2.codesigning.azure.net/" `
            -tsa "acsfluentsearch" `
            -tscp "profileFluentSearch1" `
            -act azure-cli `
            -v Information

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous release (for delta generation)
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack Velopack release
        run: >
          vpk pack
          -u Rema
          -v ${{ inputs.version }}
          -p publish
          --mainExe Rema.exe
          --icon src/Rema/Assets/rema-icon.ico

      - name: Sign Setup.exe
        shell: pwsh
        run: |
          sign code trusted-signing "${{ github.workspace }}\Releases\Rema-win-Setup.exe" `
            -tse "https://wus2.codesigning.azure.net/" `
            -tsa "acsfluentsearch" `
            -tscp "profileFluentSearch1" `
            -act azure-cli `
            -v Information

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --releaseName "Rema v${{ inputs.version }}"
          --tag v${{ inputs.version }}
