                      - generic [ref=e423]:
                        - generic [ref=e425]:
                          - generic [ref=e426]: "What we know:"
                          - list [ref=e427]:
                            - listitem [ref=e428]: The PHX.GBL domain decommissioning process began with scheduled DNS scream tests causing DNS query failures. The process includes removing trust, turning off DNS, powering off domain controllers, and final cleanup. Multiple tests and adjustments were made to address issues and monitor service disruptions throughout the decommissioning timeline.
                            - listitem [ref=e429]: Service disruptions and DNS query failures during domain decommissioning tests.
                            - listitem [ref=e430]: The incident remains active with ongoing monitoring during the decommissioning process.
                            - listitem [ref=e431]: The root cause is the absence of two DNS scavengers in the XPHX.GBL domain, contributing to DNS-related issues during decommissioning.
                          - generic [ref=e432]: "What has been done so far:"
                          - list [ref=e433]:
                            - listitem [ref=e434]: PHX.GBL domain decommissioning started with DNS turned off during scream tests.
                            - listitem [ref=e435]: Scream tests were paused and rescheduled due to issues with Azure Front Door and service impacts.
                            - listitem [ref=e436]: DNS was turned back on temporarily to mitigate a critical service outage.
                            - listitem [ref=e437]: Multiple related incident links were removed to streamline tracking.
                            - listitem [ref=e438]: Mitigation steps indicate the issue is currently mitigated.
                            - listitem [ref=e439]: An outage was declared during the DNS scream tests as part of the PHX.GBL domain decommissioning. DNS queries failed during tests, causing temporary service disruptions. The outage was managed with pauses and DNS restoration to mitigate critical impacts.
                            - listitem [ref=e440]: Mitigation involved temporarily turning DNS back on and monitoring service disruptions during the scream tests.
                          - generic [ref=e441]: What has been discussed in the bridge(s) so far:Real Time Bridge Recap
                          - paragraph [ref=e442]: The team assembled to execute a scheduled DNS service disablement across multiple domain controllers, including Phoenix servers, as part of a planned screen test. The process involved running a validated script to turn off DNS services, with careful monitoring of ticket queues, dashboards, and system health to detect any potential issues. Throughout the bridge, the team confirmed that all critical services remained operational, and any errors observed were linked to previously decommissioned servers, not the current DNS changes. The team coordinated with internal stakeholders and Azure Communications Manager to clarify the scope and ensure that only internal users would be affected, with no anticipated customer impact. After the scheduled restart, DNS services were re-disabled, and the team established ongoing monitoring to ensure continued stability, transitioning to chat for further updates after confirming successful execution.
                          - generic [ref=e443]: "Key Discussions:"
                          - list [ref=e444]:
                            - listitem [ref=e445]: "Planned DNS Service Disablement: The DNS service was intentionally disabled on several domain controllers as part of a scheduled test, with prior validation of the process and clear communication among stakeholders."
                            - listitem [ref=e446]: "No Customer Impact Detected: Monitoring confirmed that all critical services remained operational, and any errors were related to decommissioned servers, ensuring that the DNS changes did not result in customer-facing outages."
                            - listitem [ref=e447]: "Incident Communication and Awareness: The outage was declared primarily to post a banner for awareness in ICM, not due to an active service outage, and some confusion arose from incorrect ticket tagging which notified unrelated teams."
                          - generic [ref=e448]: "Actions Taken:"
                          - list [ref=e449]:
                            - listitem [ref=e450]: "Execution of DNS Disablement: The team ran a previously used script to disable DNS services, verified the status on all relevant systems, and flushed DNS to ensure the changes took effect."
                            - listitem [ref=e451]: "Comprehensive Monitoring: Ticket queues, dashboards, and system health were closely monitored throughout the process to detect any issues, with particular attention to external reports and internal connectivity."
                            - listitem [ref=e452]: "Stakeholder Coordination: The team coordinated with Azure Communications Manager and internal stakeholders to clarify the scope, confirm the resolution of previous issues, and ensure proper communication."
                          - generic [ref=e453]: "Follow-up Actions:"
                          - list [ref=e454]:
                            - listitem [ref=e455]: "Ongoing Monitoring: The team established continued monitoring after the DNS services were re-disabled to ensure system stability and quickly detect any emerging issues."
                            - listitem [ref=e456]: "Transition to Chat for Updates: After confirming the successful execution of the test, the team agreed to transition further updates to chat, maintaining vigilance for at least an hour post-change."
                            - listitem [ref=e457]: "Review of Ticket Tagging Process: The team identified confusion caused by incorrect ticket tagging and will review the process to prevent unrelated teams from being unnecessarily notified in future incidents."
